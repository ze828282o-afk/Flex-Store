<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- الشعار الرئيسي والاسم سادة -->
    <div class="main-logo-container">
        <a href="https://t.me/Z3Z3Sports" target="_blank" title="اضغط للانضمام لقناة التليجرام">
            <img src="https://img.icons8.com/fluent/150/telegram-app.png" alt="Telegram" class="main-logo">
        </a>
        <h1>Flex Store</h1>
        <p class="subtitle">اضغط على الشعار فوق للاشتراك بقناتنا، أو اختر لوجو التطبيق بالأسفل للحصول على حسابك اليومي (حساب واحد لكل جهاز يومياً)</p>
    </div>

    <!-- شبكة لوجوهات التطبيقات -->
    <div class="apps-grid">
        
        <!-- تطبيق Xtream IPTV -->
        <div class="app-card" id="card-xtream">
            <div class="logo-wrapper" onclick="revealOneData('xtream')">
                <img src="https://img.icons8.com/color/120/iptv.png" alt="Xtream IPTV" class="app-logo">
            </div>
            <h3>Xtream IPTV</h3>
            <div class="data-box" id="box-xtream"></div>
        </div>

        <!-- تطبيق Tidal -->
        <div class="app-card" id="card-tidal">
            <div class="logo-wrapper" onclick="revealOneData('tidal')">
                <img src="https://img.icons8.com/ios-filled/120/ffffff/tidal.png" alt="Tidal Music" class="app-logo" style="background:#000; padding:10px;">
            </div>
            <h3>Tidal Premium</h3>
            <div class="data-box" id="box-tidal"></div>
        </div>

        <!-- تطبيق Crunchyroll -->
        <div class="app-card" id="card-crunchy">
            <div class="logo-wrapper" onclick="revealOneData('crunchy')">
                <img src="https://img.icons8.com/color/120/crunchyroll.png" alt="Crunchyroll" class="app-logo">
            </div>
            <h3>Crunchyroll</h3>
            <div class="data-box" id="box-crunchy"></div>
        </div>

        <!-- تطبيق Netflix -->
        <div class="app-card disabled-coming-soon">
            <div class="logo-wrapper">
                <img src="https://img.icons8.com/color/120/netflix-desktop.png" alt="Netflix" class="app-logo">
            </div>
            <h3>Netflix</h3>
            <div class="coming-soon-text">انتظرونا غداً 👋</div>
            <div class="duration-text">مدة التفعيل: ساعة من النزول</div>
        </div>

    </div>

    <!-- الزرار الجديد المخصص لتفعيل الشاشات تحت الكروت -->
    <div class="telegram-action-container">
        <a href="https://t.me/Z3Z3Sports" target="_blank" class="tg-btn">
            تفعيل Netflix و IPTV للشاشة على التليجرام 📺
        </a>
    </div>
</div>

<div id="toast" class="toast">تم نسخ الحساب بنجاح! 📋</div>

<script src="script.js"></script>
</body>
</html>
